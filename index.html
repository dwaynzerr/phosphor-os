<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phosphor OS — Studio Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>

    /* Section: CSS Variables */
    :root {
      --bg: #1A1A1A;
      --bg2: #222222;
      --bg3: #2A2A2A;
      --border: #333333;
      --border2: #3D3D3D;
      --text: #F0F0F0;
      --text2: #999999;
      --text3: #555555;
      --red: #D4361B;
      --lime: #B1D418;
      --blue: #8CB7F8;
      --purple: #978CF8;
      --gray: #D0D0D0;
      --white: #F4F8FF;
      --font: 'Neue Haas Grotesk Display Pro', 'Barlow Condensed', 'Inter', sans-serif;
      --transition: all 0.2s ease;
    }
    [data-theme="light"] {
      --bg: #F4F8FF;
      --bg2: #FFFFFF;
      --bg3: #F0F0F0;
      --border: #E0E0E0;
      --border2: #CCCCCC;
      --text: #1A1A1A;
      --text2: #666666;
      --text3: #AAAAAA;
    }

    /* Section: Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); transition: background 0.2s ease, color 0.2s ease; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font); }

    /* Section: Layout — Sidebar */
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 200px;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 50;
      transition: var(--transition);
    }
    .logo-area {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; min-height: 60px;
    }
    .logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
    .logo-text { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; color: var(--lime); }
    .nav-list { padding: 12px 0; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer;
      transition: background 0.15s, color 0.15s; border: none; background: none;
      width: 100%; text-align: left; position: relative;
    }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { color: var(--lime); background: rgba(177,212,24,0.08); }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--lime); }
    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-label { font-size: 12px; font-weight: 600; letter-spacing: 0.02em; }
    .nav-badge {
      margin-left: auto; background: var(--red); color: #fff;
      font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center;
    }
    .team-section { padding: 12px; border-top: 1px solid var(--border); }
    .team-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 10px; }
    .member-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 4px; border-radius: 4px;
      transition: background 0.15s; cursor: default;
    }
    .member-row:hover { background: var(--bg3); }
    .member-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; flex-shrink: 0; position: relative;
    }
    .av-enzo { background: var(--lime); color: #1A1A1A; }
    .av-diego { background: var(--purple); color: #fff; }
    .presence-dot {
      position: absolute; bottom: 0; right: 0; width: 8px; height: 8px;
      border-radius: 50%; background: #4ade80; border: 1.5px solid var(--bg2);
    }
    .member-info { overflow: hidden; }
    .member-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .member-role { font-size: 9px; color: var(--text3); }

    /* Section: Layout — Topbar */
    .topbar {
      position: fixed; top: 0; left: 200px; right: 0; height: 44px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 40;
      transition: left 0.2s ease;
    }
    .topbar-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; flex: 1; }
    .topbar-date { font-size: 11px; color: var(--text2); white-space: nowrap; }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--bg3); color: var(--text); }

    /* Section: Layout — Main Wrapper */
    .main-wrapper { margin-left: 200px; margin-top: 44px; transition: margin-left 0.2s ease; }
    .main-content { padding: 24px; min-height: calc(100vh - 44px); }

    /* Section: Badge — Phosphor signature chevron shape */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 14px 3px 16px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 50%, calc(100% - 6px) 100%, 0 100%, 6px 50%);
    }
    .badge-lime { background: var(--lime); color: #1A1A1A; }
    .badge-red { background: var(--red); color: #fff; }
    .badge-blue { background: var(--blue); color: #1A1A1A; }
    .badge-gray { background: var(--gray); color: #1A1A1A; }
    .badge-purple { background: var(--purple); color: #fff; }
    .badge-orange { background: #E8820C; color: #fff; }

    /* Section: Cards & Layout */
    .card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 20px;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .card-hover:hover { border-color: var(--border2); transform: translateY(-1px); }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .kpi-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 20px; }
    .kpi-value { font-size: 32px; font-weight: 900; color: var(--text); line-height: 1; letter-spacing: -0.02em; }
    .kpi-sub { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 6px; }
    .kpi-trend { font-size: 11px; color: var(--lime); margin-top: 4px; font-weight: 600; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin: 24px 0 12px; }

    /* Section: Progress Bars */
    .progress { height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: var(--lime); width: 0; transition: width 0.6s ease; border-radius: 10px; }
    .progress-fill.red { background: var(--red); }
    .progress-fill.blue { background: var(--blue); }

    /* Section: Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      font-size: 12px; font-weight: 600; border: none; cursor: pointer; border-radius: 3px;
      transition: opacity 0.15s, transform 0.15s; font-family: var(--font); white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }
    .btn-lime { background: var(--lime); color: #1A1A1A; }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-red { background: var(--red); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .btn:hover { opacity: 0.85; }

    /* Section: Tasks */
    .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
    .task-item:last-child { border-bottom: none; }
    .task-checkbox { width: 18px; height: 18px; border: 1.5px solid var(--border2); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .task-checkbox.checked { background: var(--lime); border-color: var(--lime); }
    .task-checkbox.checked::after { content: '✓'; font-size: 10px; color: #1A1A1A; font-weight: 900; }
    .task-label { flex: 1; font-size: 13px; line-height: 1.4; }
    .task-label.done { text-decoration: line-through; opacity: 0.4; }

    /* Section: Avatars & Tags */
    .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; flex-shrink: 0; }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .tag-design { background: rgba(151,140,248,0.2); color: var(--purple); }
    .tag-dev { background: rgba(177,212,24,0.2); color: #8aad0e; }
    .tag-client { background: rgba(212,54,27,0.2); color: var(--red); }
    .tag-admin { background: rgba(208,208,208,0.12); color: var(--text2); }

    /* Section: Morning Brief */
    .morning-brief { border-left: 3px solid var(--lime); background: var(--bg2); padding: 16px 24px; margin-bottom: 24px; border-radius: 0 4px 4px 0; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
    .brief-greeting { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; }
    .brief-day { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .brief-stats { display: flex; gap: 32px; flex-wrap: wrap; }
    .brief-stat { text-align: center; }
    .brief-stat-val { font-size: 28px; font-weight: 900; color: var(--lime); line-height: 1; }
    .brief-stat-lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

    /* Section: Calendar */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-grid { display: grid; grid-template-columns: 56px repeat(6, 1fr); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .cal-th { background: var(--bg2); padding: 8px 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; text-align: center; border-bottom: 1px solid var(--border); color: var(--text2); }
    .cal-th.today { color: var(--lime); }
    .cal-hour-cell { font-size: 10px; color: var(--text3); padding: 10px 6px; text-align: right; background: var(--bg2); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
    .cal-cell { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 4px; min-height: 68px; background: var(--bg3); vertical-align: top; }
    .cal-event { padding: 3px 7px; border-radius: 2px; font-size: 11px; font-weight: 600; margin-bottom: 3px; cursor: pointer; }
    .ev-design { background: rgba(151,140,248,0.25); color: var(--purple); border-left: 2px solid var(--purple); }
    .ev-client { background: rgba(212,54,27,0.2); color: #e85f45; border-left: 2px solid var(--red); }
    .ev-dev { background: rgba(177,212,24,0.18); color: #8aad0e; border-left: 2px solid var(--lime); }
    .ev-admin { background: rgba(208,208,208,0.08); color: var(--text2); border-left: 2px solid var(--border2); }

    /* Section: Projects */
    .project-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 20px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
    .project-card:hover { border-color: var(--border2); transform: translateY(-1px); }
    .project-name { font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 4px; }
    .project-client { font-size: 11px; color: var(--text2); margin-bottom: 14px; font-variant-numeric: tabular-nums; }
    .project-meta-row { display: flex; justify-content: space-between; margin-top: 14px; gap: 8px; flex-wrap: wrap; }
    .project-meta-item { text-align: center; }
    .project-meta-val { font-size: 14px; font-weight: 700; }
    .project-meta-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

    /* Section: Finance */
    .finance-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 16px; }
    .urssaf-block { background: rgba(177,212,24,0.05); border: 1px solid rgba(177,212,24,0.18); border-radius: 4px; padding: 20px; margin-bottom: 16px; }
    .savings-block { background: rgba(151,140,248,0.07); border: 1px solid rgba(151,140,248,0.2); border-radius: 4px; padding: 20px; }
    .chart-container { display: flex; align-items: flex-end; gap: 6px; padding-bottom: 0; }
    .chart-bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .chart-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; }
    .chart-bar.past { background: var(--lime); }
    .chart-bar.proj { border: 1.5px dashed var(--border2); background: transparent; }
    .chart-month { font-size: 9px; color: var(--text3); margin-top: 4px; text-align: center; }

    /* Section: Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    .data-table tr:hover td { background: var(--bg3); }
    .data-table tr.row-alert td { background: rgba(212,54,27,0.05); }
    .data-table tr.row-alert td:first-child { border-left: 3px solid var(--red); padding-left: 11px; }

    /* Section: Kanban */
    .kanban-board { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 16px; min-height: 400px; }
    .kanban-col { flex: 0 0 230px; display: flex; flex-direction: column; }
    .kanban-header { padding: 8px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; border-radius: 3px 3px 0 0; display: flex; justify-content: space-between; align-items: center; }
    .kanban-body { flex: 1; padding: 8px; background: var(--bg3); border: 1px solid var(--border); border-top: none; border-radius: 0 0 3px 3px; }
    .kanban-footer { padding: 8px 12px; font-size: 10px; color: var(--text3); border: 1px solid var(--border); border-top: 1px dashed var(--border2); border-radius: 0; background: var(--bg2); }
    .prospect-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px; margin-bottom: 8px; transition: border-color 0.15s; }
    .prospect-card:hover { border-color: var(--border2); }
    .prospect-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .prospect-co { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .prospect-budget { font-size: 20px; font-weight: 900; color: var(--lime); line-height: 1; margin: 8px 0 4px; }
    .urgency-bar { height: 3px; border-radius: 2px; margin: 8px 0 4px; }
    .source-badge { font-size: 9px; padding: 2px 7px; border-radius: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg3); color: var(--text3); display: inline-block; }

    /* Section: Gantt */
    .gantt-overflow { overflow-x: auto; }
    .gantt-grid { min-width: 700px; }
    .gantt-header-row { display: grid; grid-template-columns: 160px repeat(12, 1fr); gap: 2px; margin-bottom: 6px; }
    .gantt-month { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; text-align: center; padding: 4px; }
    .gantt-row { display: grid; grid-template-columns: 160px repeat(12, 1fr); gap: 2px; margin-bottom: 8px; align-items: center; }
    .gantt-project-label { font-size: 11px; font-weight: 600; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; }
    .gantt-cell { height: 22px; background: var(--bg3); border-radius: 2px; }
    .gantt-bar { height: 22px; border-radius: 3px; }

    /* Section: Urgency & Misc */
    .j-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .j-red { background: var(--red); }
    .j-orange { background: #E8820C; }
    .j-green { background: #4ade80; }
    .j-text-red { color: var(--red); font-weight: 700; }
    .j-text-orange { color: #E8820C; font-weight: 700; }
    .j-text-green { color: #4ade80; font-weight: 600; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .empty-state { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

    /* Section: Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px; width: 100%; max-width: 620px; max-height: 85vh; overflow-y: auto; padding: 28px; }
    .modal-title { font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; padding: 4px; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 6px; display: block; }
    .form-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; font-size: 13px; border-radius: 3px; width: 100%; font-family: var(--font); }
    .form-input:focus { outline: 2px solid var(--lime); border-color: transparent; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; font-size: 13px; border-radius: 3px; width: 100%; font-family: var(--font); cursor: pointer; }
    .form-select:focus { outline: 2px solid var(--lime); }
    .form-textarea { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; font-size: 13px; border-radius: 3px; width: 100%; font-family: var(--font); resize: vertical; min-height: 80px; }
    .form-textarea:focus { outline: 2px solid var(--lime); }

    /* Section: Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--lime); color: #1A1A1A;
      padding: 10px 22px 10px 24px;
      font-size: 13px; font-weight: 700; z-index: 999;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 0 100%, 8px 50%);
      opacity: 0; transform: translateY(8px); transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Section: Agenda Task Filters */

    async function supabaseGet(table) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*`, { headers: supabaseHeaders });
      if (!response.ok) throw new Error(`Erreur GET ${table}`);
      return await response.json();
    }

    async function supabaseUpdate(table, id, data) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: 'PATCH',
        headers: supabaseHeaders,
        body: JSON.stringify(data)
      });
      if (!response.ok) throw new Error(`Erreur UPDATE ${table}`);
      return await response.json();
    }

      return await response.json();
    }

          if (!project) return false;
          
          const tasks = project.project_tasks || [];
          const newTask = {
            id: Date.now(),
            text: taskText,
            done: false
          };
          tasks.push(newTask);
          
          // Recalculer progression
          const totalTasks = tasks.length;
          const doneTasks = tasks.filter(t => t.done).length;
          const progress = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
          
          await this.updateProject(projectId, { 
            projectTasks: tasks,
            progress: progress
          });

      // PROJECT DOCUMENTS
      async addProjectDocument(projectId, doc) {
        try {
          // OPTIMISATION : Charger SEULEMENT le projet concerné
          const projects = await supabaseGet('projects');
          const project = projects.find(p => p.id === projectId);
          
          if (!project) {
            console.error('Projet introuvable:', projectId);
            return null;
          }
          
          const documents = project.documents || [];
          const newDoc = {
            id: Date.now(),
            type: doc.type,
            ref: doc.ref,
            amount: doc.amount,
            date: doc.date,
            paid: doc.paid || false,
            status: doc.status || (doc.type === 'devis' ? 'a_envoyer' : 'en_attente'),
            factureNetUrl: doc.factureNetUrl || null,
            factureNetRef: doc.factureNetRef || null
          };
          documents.push(newDoc);
          
          // Mise à jour DIRECTE sans sync invoices (trop lent et pas nécessaire)
          if (doc.type === 'devis') {
            await this.updateProject(projectId, { 
              documents,
              budget: doc.amount 
            });
          } else {
            await this.updateProject(projectId, { documents });
          }
          
          // Recalcul billed seulement si payé
          if (doc.paid && (doc.type === 'facture' || doc.type === 'acompte')) {
            const totalBilled = documents
              .filter(d => d.paid && (d.type === 'facture' || d.type === 'acompte'))
              .reduce((s, d) => s + (d.amount || 0), 0);
            await this.updateProject(projectId, { billed: totalBilled });
          }
          
          return newDoc;
        } catch (error) {
          console.error('Erreur ajout document projet:', error);
          return null;
        }

      // Synchroniser montant facturé depuis documents payés
      async syncProjectBilled(projectId) {
        try {
          const projects = await supabaseGet('projects');
          const project = projects.find(p => p.id === projectId);
          if (!project) return false;
          
          const documents = project.documents || [];
          const totalBilled = documents
            .filter(d => d.paid && (d.type === 'facture' || d.type === 'acompte'))
            .reduce((sum, d) => sum + d.amount, 0);
          
          await this.updateProject(projectId, { billed: totalBilled });
          return true;
        } catch (error) {
          console.error('Erreur sync billed:', error);
          return false;

      async markDocumentPaid(projectId, docId, paid) {
        try {
          const projects = await supabaseGet('projects');
          const project = projects.find(p => p.id === projectId);
          if (!project) return false;
          
          const documents = project.documents || [];
          const doc = documents.find(d => d.id === docId);
          if (!doc) return false;
          
          doc.paid = paid;
          await this.updateProject(projectId, { documents });
          
          // Synchroniser avec invoices (optionnel)
          try {
            const invoices = await supabaseGet('invoices');
            const invoice = invoices.find(i => i.ref === doc.ref && i.project_id === projectId);
            if (invoice) {
              await supabaseUpdate('invoices', invoice.id, {
                paid: paid,
                status: paid ? 'PAYÉ' : 'EN ATTENTE',
                status_class: paid ? 'badge-lime' : 'badge-gray'
              });
              console.log('✓ Statut synchronisé avec finances');
            }
          } catch (syncError) {
            console.warn('⚠️ Sync finances ignorée:', syncError.message);
          }
          
          // Recalculer billed
          await this.syncProjectBilled(projectId);
          
          return true;
        } catch (error) {
          console.error('Erreur marquer payé:', error);
          return false;

    // Format date for display
    function formatDate(dateString) {
      if (!dateString) return null;
      const date = new Date(dateString);
      const today = new Date();
      const diffDays = Math.ceil((date - today) / (1000 * 60 * 60 * 24));
      
      if (diffDays < 0) return '⚠️ En retard';
      if (diffDays === 0) return '📅 Aujourd\'hui';
      if (diffDays === 1) return '📅 Demain';
      if (diffDays <= 7) return `📅 Dans ${diffDays}j`;
      
      return `📅 ${date.getDate()}/${date.getMonth() + 1}`;
    }

function initDashboard() {
  // Task toggle avec sauvegarde Supabase
  document.querySelectorAll('.task-toggle').forEach(el => {
    el.addEventListener('click', async () => {
      const id = parseInt(el.dataset.taskId);
      const task = appData.tasks.find(t => t.id === id);
      if (task) {
        task.done = !task.done;
        if (task.done) {
          task.completedAt = new Date().toISOString();
        } else {
          task.completedAt = null;
        }
        navigate('dashboard');
        
        // Sauvegarder dans Supabase
        const saved = await Supabase.saveTaskToggle(id, task.done, task.completedAt);
        if (saved) {
          toast(task.done ? '✓ Tâche terminée' : 'Tâche rouverte');
        } else {
          task.done = !task.done; // Annuler si erreur
          task.completedAt = task.done ? new Date().toISOString() : null;
          navigate('dashboard');
          toast('❌ Erreur de sauvegarde');
        }
      }
    });
  });

  // Navigate to agenda
  document.getElementById('btn-see-tasks')?.addEventListener('click', () => navigate('agenda'));

  // Navigate to CRM
  document.getElementById('btn-see-crm')?.addEventListener('click', () => navigate('crm'));
  document.getElementById('btn-see-social')?.addEventListener('click', () => navigate('social'));
}

function renderAgenda() {
  const hours = ['9h', '11h', '14h', '16h', '18h'];
  const days = ['lun', 'mar', 'mer', 'jeu', 'ven', 'sam'];
  const dayLabels = ['LUN 23', 'MAR 24', 'MER 25', 'JEU 26', 'VEN 27', 'SAM 28'];
  const todayDay = 'lun';

  // Calendar
  let calHeader = `<div class="cal-th cal-hour-cell"></div>`;
  days.forEach((day, i) => {
    const isToday = day === todayDay;
    calHeader += `<div class="cal-th${isToday ? ' today' : ''}">${dayLabels[i]}${isToday ? ' ★' : ''}</div>`;
  });

  let calRows = '';
  hours.forEach(hour => {
    let row = `<div class="cal-hour-cell">${hour}</div>`;
    days.forEach(day => {
      const events = appData.events.filter(e => e.day === day && e.hour === hour);
      let cellContent = '';
      events.forEach(ev => {
        cellContent += `<div class="cal-event ev-${ev.type}"><span>${ev.title}</span><span class="avatar av-${ev.assignee}"></span></div>`;
      });
      row += `<div class="cal-cell">${cellContent}</div>`;
    });
    calRows += row;
  });

  // Appliquer filtres + tri
  let filteredTasks = filterTasks(appData.tasks);
  
  // Tri automatique : non réalisées d'abord
  filteredTasks.sort((a, b) => {
    if (a.done === b.done) {
      // Même statut → tri selon state.taskSort
      if (state.taskSort === 'date') {
        if (!a.deadline && !b.deadline) return 0;
        if (!a.deadline) return 1;
        if (!b.deadline) return -1;
        return new Date(a.deadline) - new Date(b.deadline);
      } else if (state.taskSort === 'priority') {
        const prio = { 'Haute': 0, 'Moyenne': 1, 'Basse': 2 };
        return prio[a.priority || 'Moyenne'] - prio[b.priority || 'Moyenne'];
      } else if (state.taskSort === 'urgence') {
        const aScore = (a.priority === 'Haute' ? 10 : 0) + (a.deadline && new Date(a.deadline) < Date.now() ? 5 : 0);
        const bScore = (b.priority === 'Haute' ? 10 : 0) + (b.deadline && new Date(b.deadline) < Date.now() ? 5 : 0);
        return bScore - aScore;
      }
      return 0;
    }
    // Statut différent → non réalisées d'abord
    return a.done ? 1 : -1;
  });
  
  const doneTasks = filteredTasks.filter(t => t.done).length;

  // Couleurs types
  const typeColors = {
    design: '#8CB7F8',
    dev: '#978CF8',
    client: '#D4361B',
    admin: '#D0D0D0'
  };

  // Couleurs priorités
  const priorityColors = {
    'Haute': '#D4361B',
    'Moyenne': '#E88608',
    'Basse': '#D0D0D0'
  };

  // Filtres sur UNE ligne
  const typeFilters = [
    { value: 'all', label: 'Tous' },
    { value: 'design', label: 'Design' },
    { value: 'dev', label: 'Dev' },
    { value: 'client', label: 'Client' },
    { value: 'admin', label: 'Admin' }
  ];
  const typeFilterBtns = typeFilters.map(f => 
    `<button class="btn btn-sm task-filter-type${state.taskFilters.type === f.value ? ' btn-lime' : ' btn-ghost'}" data-value="${f.value}">${f.label}</button>`
  ).join('');

  const assigneeFilters = [
    { value: 'all', label: 'Tous' },
    { value: 'enzo', label: 'Enzo' },
    { value: 'diego', label: 'Diego' }
  ];
  const assigneeFilterBtns = assigneeFilters.map(f =>
    `<button class="btn btn-sm task-filter-assignee${state.taskFilters.assignee === f.value ? ' btn-lime' : ' btn-ghost'}" data-value="${f.value}">${f.label}</button>`
  ).join('');

  const statusFilters = [
    { value: 'all', label: 'Tous' },
    { value: 'todo', label: 'À faire' },
    { value: 'done', label: 'Terminées' }
  ];
  const statusFilterBtns = statusFilters.map(f =>
    `<button class="btn btn-sm task-filter-status${state.taskFilters.status === f.value ? ' btn-lime' : ' btn-ghost'}" data-value="${f.value}">${f.label}</button>`
  ).join('');

  // Tri
  const sortBtns = ['date', 'priority', 'urgence'].map(s =>
    `<button class="btn btn-sm task-sort-btn${state.taskSort === s ? ' btn-lime' : ' btn-ghost'}" data-sort="${s}">${s === 'date' ? 'Date' : s === 'priority' ? 'Priorité' : 'Urgence'}</button>`
  ).join('');

  // Tasks list - VERSION finale
  const taskItems = filteredTasks.map(task => {
    const deadlineText = task.deadline ? formatDate(task.deadline) : '';
    const isOverdue = task.deadline && new Date(task.deadline) < new Date() && !task.done;
    const borderColor = typeColors[task.tag] || '#D0D0D0';
    const priorityColor = priorityColors[task.priority || 'Moyenne'];
    
    return `
      <div class="task-item-compact" data-task-id="${task.id}" style="position:relative;padding:10px 12px;border:1px solid var(--border);border-left:4px solid ${priorityColor};border-radius:4px;cursor:pointer;transition:all 0.2s;background:transparent;${task.done ? 'opacity:0.5;' : ''}" onmouseover="this.style.background='var(--bg3)';this.querySelector('.task-actions').style.opacity='1'" onmouseout="this.style.background='transparent';this.querySelector('.task-actions').style.opacity='0'">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="task-checkbox-click" data-task-id="${task.id}" style="cursor:pointer;" onclick="event.stopPropagation()">
            <span class="task-checkbox${task.done ? ' checked' : ''}" style="width:16px;height:16px;"></span>
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <span style="font-size:14px;font-weight:600;${task.done ? 'text-decoration:line-through;' : ''}">${task.text}</span>
            <span style="font-size:11px;padding:2px 6px;border:1px solid ${borderColor};border-radius:3px;color:${borderColor};">${task.tag}</span>
            <span style="font-size:11px;color:var(--text2);">${task.assignee}</span>
            ${deadlineText ? `<span style="font-size:11px;color:${isOverdue ? 'var(--red)' : 'var(--text2)'};">${deadlineText}</span>` : ''}
          </div>
          <div class="task-actions" style="display:flex;gap:8px;opacity:0;transition:opacity 0.2s;">
            <button class="task-edit-btn" data-task-id="${task.id}" style="background:transparent;border:none;cursor:pointer;font-size:11px;padding:4px 8px;color:var(--text2);" onclick="event.stopPropagation()">Éditer</button>
            <button class="task-delete-btn" data-task-id="${task.id}" style="background:transparent;border:none;cursor:pointer;font-size:11px;padding:4px 8px;color:var(--red);" onclick="event.stopPropagation()">Supprimer</button>
          </div>
        </div>
      </div>`;
  }).join('');

  const emptyState = filteredTasks.length === 0 ? `<div style="color:var(--text2);padding:32px;text-align:center;"><div style="font-size:48px;margin-bottom:12px;">📋</div><div>Aucune tâche</div></div>` : '';

  // Distribution
  const enzoTasks = appData.tasks.filter(t => t.assignee === 'enzo').length;
  const diegoTasks = appData.tasks.filter(t => t.assignee === 'diego').length;
  const total = enzoTasks + diegoTasks || 1;
  const enzoPercent = Math.round(enzoTasks / total * 100);
  const diegoPercent = 100 - enzoPercent;

  return `
    <div class="card" style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="btn btn-ghost btn-sm" id="cal-prev">&#8592;</button>
          <span class="section-label" style="margin:0;">Semaine du 23 mars 2026</span>
          <button class="btn btn-ghost btn-sm" id="cal-next">&#8594;</button>
        </div>
        <button class="btn btn-lime btn-sm" id="btn-add-event">+ Événement</button>
      </div>
      <div class="cal-grid" style="display:grid;grid-template-columns:60px repeat(6,1fr);gap:2px;">${calHeader}${calRows}</div>
    </div>

    <div class="divider"></div>

    <div class="card" style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-label">Tâches · ${filteredTasks.length} · ${doneTasks} ✓</div>
        <button class="btn btn-lime btn-sm" id="btn-add-task">+ Nouvelle tâche</button>
      </div>

      <!-- Filtres + Tri avec labels -->
      <div style="display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap;">
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);margin-bottom:6px;">Type</div>
          <div style="display:flex;gap:4px;">${typeFilterBtns}</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);margin-bottom:6px;">Assigné</div>
          <div style="display:flex;gap:4px;">${assigneeFilterBtns}</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);margin-bottom:6px;">Statut</div>
          <div style="display:flex;gap:4px;">${statusFilterBtns}</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);margin-bottom:6px;">Tri</div>
          <div style="display:flex;gap:4px;">${sortBtns}</div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:6px;">${taskItems}${emptyState}</div>
    </div>

    <div class="divider"></div>

    <div class="card">
      <div class="section-label">Répartition équipe</div>
      <div style="display:flex;flex-direction:column;gap:14px;margin-top:8px;">
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <div style="display:flex;align-items:center;gap:8px;"><span class="avatar av-enzo"></span><span>Enzo</span></div>
            <span class="badge badge-gray">${enzoTasks} tâche${enzoTasks !== 1 ? 's' : ''} (${enzoPercent}%)</span>
          </div>
          <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${enzoPercent}%;background:var(--lime);border-radius:4px;transition:width 0.4s;"></div>
          </div>
        </div>
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <div style="display:flex;align-items:center;gap:8px;"><span class="avatar av-diego"></span><span>Diego</span></div>
            <span class="badge badge-blue">${diegoTasks} tâche${diegoTasks !== 1 ? 's' : ''} (${diegoPercent}%)</span>
          </div>
          <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${diegoPercent}%;background:var(--blue);border-radius:4px;transition:width 0.4s;"></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// PAGE PROJET DÉDIÉE - Plein écran
// state.currentProjectId stocke l'ID du projet en cours de consultation

function renderProjectPage() {
  const projectId = state.currentProjectId;
  const project = appData.projects.find(p => p.id === projectId);
  
  if (!project) {
    return `<div style="padding:40px;text-align:center;">Projet introuvable</div>`;
  }
  
  const projectTasks = project.projectTasks || [];
  const doneTasks = projectTasks.filter(t => t.done).length;
  
  // CALCUL AUTO PROGRESSION
  const autoProgress = projectTasks.length > 0 
    ? Math.round((doneTasks / projectTasks.length) * 100)
    : project.progress || 0;
  
  const documents = project.documents || [];
  
  const devis = documents.filter(d => d.type === 'devis');
  const factures = documents.filter(d => d.type === 'facture');
  const acomptes = documents.filter(d => d.type === 'acompte');
  
  // Fonction helper pour badges statuts
  const getStatusBadge = (doc) => {
    const statusMap = {
      // Factures/Acomptes
      'payee': { label: 'Payée', class: 'badge-lime' },
      'en_attente': { label: 'En attente', class: 'badge-orange' },
      'a_envoyer': { label: 'À envoyer', class: 'badge-blue' },
      'a_relancer': { label: 'À relancer', class: 'badge-red' },
      // Devis
      'a_modifier': { label: 'À modifier', class: 'badge-orange' },
      'accepte': { label: 'Accepté', class: 'badge-lime' },
      'refuse': { label: 'Refusé', class: 'badge-gray' }
    };
    
    // Si paid=true, forcer "Payée"
    if (doc.paid && doc.type !== 'devis') {
      return { label: 'Payée', class: 'badge-lime' };
    }
    
    const status = statusMap[doc.status] || { label: 'En attente', class: 'badge-gray' };
    return status;
  };
  
  return `
    <div style="padding:40px;max-width:1400px;margin:0 auto;">
      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;">
        <div>
          <button class="btn btn-ghost btn-sm" onclick="navigate('projects')" style="margin-bottom:12px;">← Retour aux projets</button>
          <h1 style="font-size:32px;font-weight:900;margin:0;color:${project.color};">${project.name}</h1>
          <div style="font-size:14px;color:var(--text2);margin-top:8px;">${project.client} · ${project.type}</div>
        </div>
        <div style="display:flex;gap:12px;">
          <button class="btn btn-lime" id="btn-edit-project">Éditer le projet</button>
          <button class="btn btn-red" id="btn-delete-project">Supprimer</button>
        </div>
      </div>
      
      <!-- Grille 2 colonnes -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:40px;">
        
        <!-- Colonne gauche -->
        <div style="display:flex;flex-direction:column;gap:32px;">
          
          <!-- Infos principales -->
          <div class="card">
            <div class="section-label" style="margin-bottom:20px;">Informations</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;">
              <div>
                <div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;">${project.type === 'maintenance' ? 'Budget annuel' : 'Budget'}</div>
                <div style="font-size:24px;font-weight:900;">${formatEuro(project.budget)}</div>
              </div>
              ${project.type === 'maintenance' ? `
                <div>
                  <div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;">Budget mensuel</div>
                  <div style="font-size:24px;font-weight:900;color:var(--purple);">${formatEuro(Math.round(project.budget / 12))}</div>
                </div>
              ` : `
                <div>
                  <div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;">Facturé</div>
                  <div style="font-size:24px;font-weight:900;color:var(--lime);">${formatEuro(project.billed)}</div>
                </div>
              `}
              ${project.type !== 'maintenance' ? `
                <div>
                  <div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;">Avancement</div>
                  <div style="font-size:24px;font-weight:900;">${autoProgress}%</div>
                </div>
              ` : ''}
            </div>
            ${project.type !== 'maintenance' ? `
              <div style="margin-top:20px;">
                <div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;">Progression (${doneTasks}/${projectTasks.length} tâches)</div>
                <div style="height:12px;background:var(--border);border-radius:6px;overflow:hidden;">

function renderProjects() {
  const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];

  // Extraire années disponibles
  const years = new Set();
  appData.projects.forEach(p => {
    if (p.startDate) years.add(new Date(p.startDate).getFullYear());
    if (p.endDate) years.add(new Date(p.endDate).getFullYear());
  });
  const yearsList = Array.from(years).sort((a, b) => b - a);
  if (yearsList.length === 0) yearsList.push(new Date().getFullYear());
  
  // Extraire clients uniques
  const clients = [...new Set(appData.projects.map(p => p.client))].sort();
  
  // Filtrer projets (exclure maintenance)
  let filteredProjects = appData.projects.filter(p => p.type !== 'maintenance');
  
  // Filtre année
  if (state.projectFilters.year !== 'all') {
    filteredProjects = filteredProjects.filter(p => {
      // Si pas de dates, considérer comme année courante
      if (!p.startDate && !p.endDate) {
        return state.projectFilters.year === new Date().getFullYear();
      }
      
      const startYear = p.startDate ? new Date(p.startDate).getFullYear() : null;
      const endYear = p.endDate ? new Date(p.endDate).getFullYear() : null;
      
      // Projet appartient à l'année si start OU end correspond
      return startYear === state.projectFilters.year || endYear === state.projectFilters.year;
    });
  }
  
  // Filtre client
  if (state.projectFilters.client !== 'all') {
    filteredProjects = filteredProjects.filter(p => p.client === state.projectFilters.client);
  }
  
  // TRI AUTOMATIQUE PAR DATE (plus récent en premier)
  filteredProjects.sort((a, b) => {
    const dateA = new Date(a.startDate || a.endDate || '2000-01-01');
    const dateB = new Date(b.startDate || b.endDate || '2000-01-01');
    return dateB - dateA; // DESC : plus récent d'abord
  });

  const totalBudget = filteredProjects.reduce((s, p) => s + p.budget, 0);
  const totalBilled = filteredProjects.reduce((s, p) => s + p.billed, 0);

  const projectCards = filteredProjects.map(p => `
    <div class="project-card card-clickable" data-project-id="${p.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
        <div class="project-name" style="color:${p.color}">${p.name}</div>
        <span class="badge ${p.statusClass}">${p.status}</span>
      </div>
      <div class="project-type">${p.client} · ${p.type}</div>

      <div class="progress" style="margin-top:8px;">
        <div class="progress-fill" data-value="${p.progress}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;">
        <span style="font-size:11px;color:var(--text2);">${p.progress}% complet</span>
        <span style="font-size:11px;color:var(--text3);">
          ${p.startDate || p.endDate 
            ? (p.startDate ? new Date(p.startDate).toLocaleDateString('fr-FR', {month: 'short', year: 'numeric'}) : '') + 
              (p.endDate ? ' → ' + new Date(p.endDate).toLocaleDateString('fr-FR', {month: 'short', year: 'numeric'}) : '')
            : p.deadline ? 'Deadline: ' + p.deadline : ''}
        </span>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
        <div>
          <div style="font-size:18px;font-weight:900;color:var(--text);">${formatEuro(p.budget)}</div>
          <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;">Budget total</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:18px;font-weight:900;color:${p.billed > 0 ? 'var(--lime)' : 'var(--text3)'};">${formatEuro(p.billed)}</div>
          <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;">Facturé</div>
        </div>
      </div>
    </div>
  `).join('');

  const ganttHeader = months.map(m => `<div class="gantt-month">${m}</div>`).join('');

  const ganttRows = filteredProjects.map(p => {
    // Calculer position depuis dates réelles si présentes
    let startMonth = p.ganttStart || 0;
    let endMonth = p.ganttEnd || 1;
    
    if (p.startDate && p.endDate) {
      const start = new Date(p.startDate);
      const end = new Date(p.endDate);
      startMonth = start.getMonth();
      endMonth = end.getMonth();
    }
    
    const cells = Array.from({ length: 12 }, (_, i) =>
      i >= startMonth && i <= endMonth
        ? `<div class="gantt-bar" style="background:${p.color};opacity:0.8;"></div>`
        : `<div class="gantt-cell" style="background:var(--bg3);"></div>`
    ).join('');
    
    return `
      <div class="gantt-row">
        <div class="gantt-label" style="color:${p.color};">${p.name}</div>
        ${cells}
      </div>
    `;
  }).join('');

  return `
    <!-- Filtres -->
    <div style="display:flex;gap:16px;align-items:center;margin-bottom:24px;padding:16px;background:var(--bg2);border-radius:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);">Année</label>
        <select id="filter-year" class="form-select" style="min-width:120px;">
          <option value="all">Toutes</option>
          ${yearsList.map(y => `<option value="${y}" ${state.projectFilters.year === y ? 'selected' : ''}>${y}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);">Client</label>
        <select id="filter-client" class="form-select" style="min-width:180px;">
          <option value="all">Tous</option>
          ${clients.map(c => `<option value="${c}" ${state.projectFilters.client === c ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div style="margin-left:auto;font-size:13px;color:var(--text2);">
        ${filteredProjects.length} projet${filteredProjects.length > 1 ? 's' : ''}
      </div>
    </div>
  
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div>
        <h2 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);">${filteredProjects.length} projets actifs</h2>
      </div>
      <button class="btn btn-lime btn-sm" id="btn-add-project">+ Projet</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:24px;">
      ${projectCards}
    </div>

    <div class="card" style="margin-bottom:24px;margin-top:32px;">
      <div style="display:flex;gap:40px;flex-wrap:wrap;">
        <div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">Budget total projets</div>
          <div style="font-size:28px;font-weight:900;">${formatEuro(totalBudget)}</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">Facturé</div>
          <div style="font-size:28px;font-weight:900;color:var(--lime);">${formatEuro(totalBilled)}</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">Restant à facturer</div>
          <div style="font-size:28px;font-weight:900;color:var(--blue);">${formatEuro(totalBudget - totalBilled)}</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">TJM moyen</div>
          <div style="font-size:28px;font-weight:900;color:var(--purple);">450 €</div>
        </div>
      </div>
    </div>

    <div class="section-label">Planning ${state.projectFilters.year !== 'all' ? state.projectFilters.year : new Date().getFullYear()}</div>
    <div class="card">
      <div class="gantt-wrap">
        <div class="gantt-row">
          <div class="gantt-label"></div>
          ${ganttHeader}
        </div>
        ${ganttRows}
      </div>
    </div>
  `;
}

function renderMaintenance() {
  // Filtrer uniquement projets maintenance
  const maintenanceProjects = appData.projects.filter(p => p.type === 'maintenance');
  
  // TRI AUTOMATIQUE PAR DATE (plus récent en premier)
  maintenanceProjects.sort((a, b) => {
    const dateA = new Date(a.startDate || a.endDate || '2000-01-01');
    const dateB = new Date(b.startDate || b.endDate || '2000-01-01');
    return dateB - dateA;
  });
  
  const totalMaintenance = maintenanceProjects.reduce((s, p) => s + p.budget, 0);
  const totalMonthly = maintenanceProjects.reduce((s, p) => s + Math.round(p.budget / 12), 0);
  
  const projectCards = maintenanceProjects.map(p => {
    const monthlyBudget = Math.round(p.budget / 12);
    return `

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
        <div>
          <div style="font-size:18px;font-weight:900;color:var(--text);">${formatEuro(p.budget)}</div>
          <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;">Annuel</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:18px;font-weight:900;color:var(--purple);">${formatEuro(monthlyBudget)}</div>
          <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;">Mensuel</div>

          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">Budget mensuel total</div>

function initMaintenance() {
  // Clic sur carte → page projet
  document.querySelectorAll('.project-card[data-project-id]').forEach(card => {
    card.style.cursor = 'pointer';
    card.addEventListener('click', () => {
      const id = parseInt(card.dataset.projectId);
      state.currentProjectId = id;
      navigate('project');
    });
  });
  
  // Bouton ajouter maintenance
  document.getElementById('btn-add-maintenance')?.addEventListener('click', () => {
    openModal(`
      <div class="modal-box">
        <div class="modal-title">Nouveau contrat maintenance<button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="nm-name" placeholder="Ex: Maintenance Heroiks"></div>
        <div class="form-group"><label class="form-label">Client *</label><input class="form-input" id="nm-client" placeholder="Nom du client"></div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Montant annuel (€) *</label>
            <input class="form-input" type="number" id="nm-budget" placeholder="6840">
            <div style="font-size:11px;color:var(--text3);margin-top:4px;">Budget total pour l'année</div>
          </div>
          <div class="form-group">
            <label class="form-label">Date début *</label>
            <input class="form-input" type="date" id="nm-start" value="${new Date().toISOString().split('T')[0]}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Fréquence facturation</label>
          <select class="form-input" id="nm-frequency">
            <option value="monthly">Mensuelle</option>
            <option value="quarterly">Trimestrielle</option>
            <option value="yearly">Annuelle</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;margin-top:20px;">
          <button class="btn btn-purple" id="save-maintenance">Créer</button>
          <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        </div>
      </div>
    `);
    
    document.getElementById('save-maintenance')?.addEventListener('click', async () => {
      const name = document.getElementById('nm-name').value.trim();
      const client = document.getElementById('nm-client').value.trim();
      const budget = parseInt(document.getElementById('nm-budget').value) || 0;
      const startDate = document.getElementById('nm-start').value;
      const frequency = document.getElementById('nm-frequency').value;
      
      if (!name) { toast('Nom requis'); return; }
      if (!client) { toast('Client requis'); return; }
      if (!budget) { toast('Montant requis'); return; }
      
      const projet = {
        name,
        client,
        type: 'maintenance',
        budget,
        billed: 0,
        progress: 100,
        status: 'MAINTENANCE',
        statusClass: 'badge-purple',
        color: '#978CF8',
        deadline: '',
        ganttStart: 0,
        ganttEnd: 11,
        tasks: [],
        notes: '',
        startDate: startDate,
        endDate: null,
        frequency: frequency || 'monthly',
        documents: [],
        projectTasks: []
      };
      
      const created = await Supabase.addProject(projet);
      if (created) {
        await Supabase.loadAllData();
        closeModal();
        toast('✓ Contrat créé');
        navigate('maintenance');
      } else {
        toast('❌ Erreur');
      }
    });
  });
}

function renderFinances() {
  // Extraire TOUS les documents depuis projets
  const projectDocuments = [];
  appData.projects.forEach(project => {
    (project.documents || []).forEach(doc => {
      projectDocuments.push({
        ...doc,
        projectId: project.id,
        projectName: project.name,
        client: project.client
      });
    });
  });
  
  // Combiner avec anciennes factures (si elles existent encore)
  const allInvoices = [...projectDocuments];
  
  // Calculer maintenance mensuelle totale
  const maintenanceProjects = appData.projects.filter(p => p.type === 'maintenance');
  const totalMaintenanceMonthly = maintenanceProjects.reduce((sum, p) => {
    return sum + Math.round(p.budget / 12);
  }, 0);
  
  // Calculer CA réel par mois depuis les factures payées + maintenance estimée
  const currentYear = new Date().getFullYear();
  const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
  const monthlyCAReal = months.map((month, index) => {
    // CA facturé ce mois
    const monthCA = allInvoices
      .filter(inv => {
        if (!inv.paid && inv.status !== 'payee') return false; // Seulement payées
        const invDate = new Date(inv.date);
        return invDate.getFullYear() === currentYear && invDate.getMonth() === index;
      })
      .reduce((sum, inv) => sum + (inv.amount || 0), 0);
    
    const currentMonth = new Date().getMonth();
    
    // Ajouter maintenance mensuelle estimée aux mois futurs
    const withMaintenance = index >= currentMonth 
      ? monthCA + totalMaintenanceMonthly 
      : monthCA;
    
    return {
      month,
      amount: withMaintenance,
      projected: index > currentMonth // Futur = projeté
    };
  });
  
  // Calculer CA payé et CA en attente
  const caPaye = allInvoices
    .filter(i => i.status === 'payee' || i.paid === true)
    .reduce((s, i) => s + (i.amount || 0), 0);
    
  const caEnAttente = allInvoices
    .filter(i => i.status !== 'payee' && i.paid !== true && i.type !== 'devis')
    .reduce((s, i) => s + (i.amount || 0), 0);
  
  // CA total annuel maintenance
  const totalMaintenanceAnnual = maintenanceProjects.reduce((sum, p) => sum + p.budget, 0);
  
  // CA total cible = CA actuel + CA en attente + Maintenance annuelle
  const yearTarget = caPaye + caEnAttente + totalMaintenanceAnnual;
  const monthlyTarget = Math.round(yearTarget / 12);
  
  const ytd = caPaye; // CA réel = CA payé
  const currentMonthCA = monthlyCAReal[new Date().getMonth()].amount;
  const monthProgress = monthlyTarget > 0 ? Math.round(currentMonthCA / monthlyTarget * 100) : 0;
  const seuilTVA = 77700;
  const distanceTVA = seuilTVA - ytd;
  const annualProgress = yearTarget > 0 ? Math.round(ytd / yearTarget * 100) : 0;
  const tvaProgress = Math.round(ytd / seuilTVA * 100);
  const tvaColor = distanceTVA < 20000 ? 'var(--orange)' : 'var(--lime)';

  // URSSAF — split YTD 50/50
  const perPerson = Math.round(ytd / 2);
  const urssaf = Math.round(perPerson * 0.22);
  const netPerPerson = perPerson - urssaf;

  // Fonction pour obtenir badge statut
  const getStatusBadge = (doc) => {
    const statusMap = {
      // Factures
      'payee': { label: 'Payée', class: 'badge-lime' },
      'en_attente': { label: 'En attente', class: 'badge-orange' },
      'a_envoyer': { label: 'À envoyer', class: 'badge-blue' },
      'a_relancer': { label: 'À relancer', class: 'badge-red' },
      // Devis
      'a_modifier': { label: 'À modifier', class: 'badge-orange' },
      'accepte': { label: 'Accepté', class: 'badge-lime' },
      'refuse': { label: 'Refusé', class: 'badge-gray' }
    };
    
    // Si paid=true, forcer "Payée"
    if (doc.paid && doc.type !== 'devis') {
      return { label: 'Payée', class: 'badge-lime' };
    }
    
    const status = statusMap[doc.status] || { label: 'En attente', class: 'badge-gray' };
    return status;
  };
  
  // Trier par date (plus récent d'abord)
  allInvoices.sort((a, b) => new Date(b.date) - new Date(a.date));

  const invoiceRows = allInvoices.map(inv => {
    const status = getStatusBadge(inv);
    return `
    <tr class="invoice-row" data-project-id="${inv.projectId}" style="cursor:pointer;">
      <td><span style="font-weight:700;font-family:monospace;font-size:12px;">${inv.ref}</span></td>

        <div style="font-weight:600;font-size:13px;">${inv.projectName}</div>

      <td><strong style="font-size:14px;">${formatEuro(inv.amount)}</strong></td>
      <td><span class="badge ${status.class}">${status.label}</span></td>
      <td style="font-size:11px;color:var(--text3);">${new Date(inv.date).toLocaleDateString('fr-FR')}</td>
      <td>
        <button class="btn btn-ghost btn-sm edit-invoice-btn" data-project-id="${inv.projectId}" data-doc-id="${inv.id}" onclick="event.stopPropagation();">
          Éditer

      </td>
    </tr>
  `;
  }).join('');

  const maxAmount = Math.max(...monthlyCAReal.map(m => m.amount), 1000); // Min 1000 pour éviter division par 0
  const chartBars = monthlyCAReal.map(m => {
    const heightPct = Math.round(m.amount / maxAmount * 100);
    return `
      <div class="chart-bar-col">
        <div class="chart-bar ${m.projected ? 'projected' : 'past'}"
             style="height:${heightPct}%;min-height:3px;"
             title="${m.month}: ${formatEuro(m.amount)}">
        </div>
        <div class="chart-bar-lbl">${m.month}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="kpi-grid" style="margin-bottom:24px;">

      <div class="kpi-card">
        <div class="kpi-value" style="color:var(--lime);">${formatEuro(caPaye)}</div>
        <div class="kpi-sub">Factures payées (encaissées)</div>
        <div class="kpi-trend">${annualProgress}% de l'objectif (${formatEuro(yearTarget)})</div>
        <div style="font-size:10px;color:var(--text3);margin-top:8px;text-transform:uppercase;letter-spacing:0.05em;">CA Validé ${currentYear}</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-value" style="color:var(--orange);">${formatEuro(caEnAttente)}</div>
        <div class="kpi-sub">Factures en attente de paiement</div>
        <div class="kpi-trend">${allInvoices.filter(i => i.status !== 'payee' && !i.paid && i.type !== 'devis').length} facture(s) non payée(s)</div>
        <div style="font-size:10px;color:var(--text3);margin-top:8px;text-transform:uppercase;letter-spacing:0.05em;">À encaisser</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-value" style="color:${tvaColor};">${formatEuro(distanceTVA)}</div>
        <div class="kpi-sub">Avant seuil TVA ${formatEuro(seuilTVA)}</div>
        <div class="kpi-trend" style="color:${tvaColor};">Seuil atteint à ${tvaProgress}%</div>
        <div style="font-size:10px;color:var(--text3);margin-top:8px;text-transform:uppercase;letter-spacing:0.05em;">Franchise TVA</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-value">${formatEuro(netPerPerson)}</div>
        <div class="kpi-sub">Net par personne (après URSSAF 22%)</div>
        <div class="kpi-trend">URSSAF: ${formatEuro(urssaf)} / personne</div>
        <div style="font-size:10px;color:var(--text3);margin-top:8px;text-transform:uppercase;letter-spacing:0.05em;">Revenu net YTD</div>
      </div>

    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="section-label" style="margin:0;">Tous les documents (${allInvoices.length})</div>
    </div>

    <div class="card" style="margin-bottom:24px;overflow-x:auto;">
      <table class="data-table" style="width:100%;">
        <thead>
          <tr>
            <th style="width:120px;">Référence</th>
            <th style="width:200px;">Projet</th>

    <div class="grid-2" style="margin-bottom:24px;">

        <div style="margin-top:16px;">
          ${monthlyCAReal.map((m, idx) => {

            const diff = m.amount - objectif;

            return `

function initFinances() {
  // Clic sur ligne facture → Page projet
  document.querySelectorAll('.invoice-row[data-project-id]').forEach(row => {
    row.addEventListener('click', () => {
      const projectId = parseInt(row.dataset.projectId);
      state.currentProjectId = projectId;
      navigate('project');
    });
  });
  
  // Bouton éditer document
  document.querySelectorAll('.edit-invoice-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const projectId = parseInt(btn.dataset.projectId);
      const docId = parseInt(btn.dataset.docId);
      
      const project = appData.projects.find(p => p.id === projectId);
      if (!project) return;
      
      const doc = (project.documents || []).find(d => d.id === docId);
      if (!doc) return;
      
      // Générer options statuts selon type
      let statusOptions = '';
      if (doc.type === 'devis') {
        statusOptions = `
          <option value="a_envoyer" ${doc.status === 'a_envoyer' ? 'selected' : ''}>À envoyer</option>
          <option value="a_modifier" ${doc.status === 'a_modifier' ? 'selected' : ''}>À modifier</option>
          <option value="accepte" ${doc.status === 'accepte' ? 'selected' : ''}>Accepté</option>
          <option value="refuse" ${doc.status === 'refuse' ? 'selected' : ''}>Refusé</option>
        `;
      } else {
        statusOptions = `
          <option value="payee" ${doc.status === 'payee' || doc.paid ? 'selected' : ''}>Payée</option>
          <option value="en_attente" ${doc.status === 'en_attente' ? 'selected' : ''}>En attente</option>
          <option value="a_envoyer" ${doc.status === 'a_envoyer' ? 'selected' : ''}>À envoyer</option>
          <option value="a_relancer" ${doc.status === 'a_relancer' ? 'selected' : ''}>À relancer</option>
        `;
      }
      
      openModal(`
        <div class="modal-box">
          <div class="modal-title">Éditer ${doc.type} <button class="modal-close" onclick="closeModal()">×</button></div>
          
          <div class="form-group">
            <label class="form-label">Référence *</label>
            <input class="form-input" id="edit-doc-ref" value="${doc.ref}">
          </div>
          
          <div class="form-group">
            <label class="form-label">Projet</label>
            <input class="form-input" value="${project.name} (${project.client})" disabled style="opacity:0.6;">
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Montant (€) *</label>
              <input class="form-input" type="number" id="edit-doc-amount" value="${doc.amount}">
            </div>
            <div class="form-group">
              <label class="form-label">Date *</label>
              <input class="form-input" type="date" id="edit-doc-date" value="${doc.date}">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Type *</label>
              <select class="form-input" id="edit-doc-type">
                <option value="facture" ${doc.type === 'facture' ? 'selected' : ''}>Facture</option>
                <option value="devis" ${doc.type === 'devis' ? 'selected' : ''}>Devis</option>
                <option value="acompte" ${doc.type === 'acompte' ? 'selected' : ''}>Acompte</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Statut *</label>
              <select class="form-input" id="edit-doc-status">
                ${statusOptions}
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Lien Facture.net (optionnel)</label>
            <input class="form-input" id="edit-doc-url" value="${doc.factureNetUrl || ''}" placeholder="https://www.facture.net/...">
          </div>
          
          <div class="form-group">
            <label class="form-label">Référence Facture.net (optionnel)</label>
            <input class="form-input" id="edit-doc-netref" value="${doc.factureNetRef || ''}" placeholder="FAC-2024-001">
          </div>
          
          ${doc.factureNetUrl ? `
            <div style="margin-top:12px;padding:12px;background:var(--bg2);border-radius:6px;">
              <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">Lien actuel</div>
              <a href="${doc.factureNetUrl}" target="_blank" style="font-size:11px;color:var(--blue);text-decoration:underline;">Voir sur Facture.net →</a>
            </div>
          ` : ''}
          
          <div style="display:flex;gap:8px;margin-top:20px;">
            <button class="btn btn-lime" id="save-edit-doc">Sauvegarder</button>
            <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
          </div>
        </div>
      `);
      
      document.getElementById('save-edit-doc')?.addEventListener('click', async () => {
        const newRef = document.getElementById('edit-doc-ref').value.trim();
        const newAmount = parseFloat(document.getElementById('edit-doc-amount').value);
        const newDate = document.getElementById('edit-doc-date').value;
        const newType = document.getElementById('edit-doc-type').value;
        const newStatus = document.getElementById('edit-doc-status').value;
        const newUrl = document.getElementById('edit-doc-url').value.trim();
        const newNetRef = document.getElementById('edit-doc-netref').value.trim();
        
        // Validation
        if (!newRef || !newAmount || !newDate) {
          toast('❌ Référence, montant et date sont obligatoires');
          return;
        }
        
        // Mettre à jour document
        const documents = project.documents.map(d => {
          if (d.id === docId) {
            return {
              ...d,
              ref: newRef,
              amount: newAmount,
              date: newDate,
              type: newType,
              status: newStatus,
              paid: newStatus === 'payee',
              factureNetUrl: newUrl || null,
              factureNetRef: newNetRef || null
            };
          }
          return d;
        });
        
        const updated = await Supabase.updateProject(projectId, { documents });
        if (updated) {
          // Recalculer billed si changement de montant ou statut payée
          await Supabase.syncProjectBilled(projectId);
          
          // Mise à jour LOCALE
          const proj = appData.projects.find(p => p.id === projectId);
          if (proj) {
            proj.documents = documents;
            // Recalculer billed localement
            const totalBilled = documents
              .filter(d => d.paid && (d.type === 'facture' || d.type === 'acompte'))
              .reduce((s, d) => s + (d.amount || 0), 0);
            proj.billed = totalBilled;
          }
          
          closeModal();
          toast('✓ Document mis à jour');
          navigate('finances');
        } else {
          toast('❌ Erreur lors de la sauvegarde');
        }
      });
      
      // Changer options statut selon type
      document.getElementById('edit-doc-type')?.addEventListener('change', (e) => {
        const typeSelect = e.target;
        const statusSelect = document.getElementById('edit-doc-status');
        const currentStatus = statusSelect.value;
        
        if (typeSelect.value === 'devis') {
          statusSelect.innerHTML = `
            <option value="a_envoyer" ${currentStatus === 'a_envoyer' ? 'selected' : ''}>À envoyer</option>
            <option value="a_modifier" ${currentStatus === 'a_modifier' ? 'selected' : ''}>À modifier</option>
            <option value="accepte" ${currentStatus === 'accepte' ? 'selected' : ''}>Accepté</option>
            <option value="refuse" ${currentStatus === 'refuse' ? 'selected' : ''}>Refusé</option>
          `;
        } else {
          statusSelect.innerHTML = `
            <option value="payee" ${currentStatus === 'payee' ? 'selected' : ''}>Payée</option>
            <option value="en_attente" ${currentStatus === 'en_attente' ? 'selected' : ''}>En attente</option>
            <option value="a_envoyer" ${currentStatus === 'a_envoyer' ? 'selected' : ''}>À envoyer</option>
            <option value="a_relancer" ${currentStatus === 'a_relancer' ? 'selected' : ''}>À relancer</option>
          `;
        }
      });
    });
  });

  document.getElementById('btn-add-invoice')?.addEventListener('click', () => {
    openModal(`
      <div class="modal-box">
        <div class="modal-title">Nouvelle facture <button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Référence</label><input class="form-input" id="ni-ref" placeholder="FAC-026"></div>
          <div class="form-group"><label class="form-label">Client</label><input class="form-input" id="ni-client" placeholder="Nom client"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Montant (€)</label><input class="form-input" type="number" id="ni-amount" placeholder="2000"></div>
          <div class="form-group"><label class="form-label">Type</label><select class="form-input" id="ni-type"><option value="Facture">Facture</option><option value="Devis">Devis</option><option value="Acompte">Acompte</option></select></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:20px;">
          <button class="btn btn-lime" id="save-invoice-btn">Créer</button>
          <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        </div>
      </div>
    `);
    document.getElementById('save-invoice-btn')?.addEventListener('click', async () => {
      const ref = document.getElementById('ni-ref')?.value.trim();
      if (!ref) { toast('Référence requise'); return; }
      
      // Sauvegarder dans Supabase
      const newInvoice = await Supabase.addInvoice({
        ref,
        client: document.getElementById('ni-client')?.value || '',
        amount: parseInt(document.getElementById('ni-amount')?.value) || 0,
        type: document.getElementById('ni-type')?.value || 'Facture',
        status: 'BROUILLON',
        statusClass: 'badge-gray'
      });
      
      if (newInvoice) {
        await Supabase.loadAllData();
        closeModal();
        toast('✓ Facture créée !');
        navigate('finances');
      } else {
        toast('❌ Erreur de sauvegarde');
      }
    });
  });
}

    // --- CRM ---
function renderCRM() {
  const prospects = appData.crmProspects || [];
  
  // Filtrer
  let filtered = prospects.filter(p => {
    if (crmState.filterStatus !== 'all' && p.status !== crmState.filterStatus) return false;
    if (crmState.filterCity !== 'all' && p.city !== crmState.filterCity) return false;
    if (crmState.search) {
      const search = crmState.search.toLowerCase();
      return p.firstName.toLowerCase().includes(search) ||
             p.lastName.toLowerCase().includes(search) ||
             p.companyName.toLowerCase().includes(search);
    }
    return true;
  });
  
  // Trier
  if (crmState.sort === 'name_asc') {
    filtered.sort((a, b) => a.lastName.localeCompare(b.lastName));
  } else if (crmState.sort === 'name_desc') {
    filtered.sort((a, b) => b.lastName.localeCompare(a.lastName));
  } else if (crmState.sort === 'company_asc') {
    filtered.sort((a, b) => a.companyName.localeCompare(b.companyName));
  } else {
    filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  }
  
  const cities = [...new Set(prospects.map(p => p.city))].sort();
  
  const stats = {
    total: prospects.length,
    toContact: prospects.filter(p => p.status === 'to_contact').length,
    contacted: prospects.filter(p => p.status === 'contacted').length,
    qualified: prospects.filter(p => p.status === 'qualified').length,
    proposalSent: prospects.filter(p => p.status === 'proposal_sent').length,
    clients: prospects.filter(p => p.status === 'client').length
  };
  
  return `
<div style="padding:24px;">
  
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
    <div>
      <h2 style="font-size:24px;font-weight:700;margin:0;">CRM</h2>
      <div style="font-size:13px;color:var(--text2);margin-top:4px;">${filtered.length} prospect(s) · ${stats.total} total</div>
    </div>
  </div>
  
  <div style="display:flex;gap:12px;margin-bottom:24px;">
    <div class="kpi-card" style="flex:1;">
      <div class="kpi-value">${stats.toContact}</div>
      <div class="kpi-sub">À contacter</div>
    </div>
    <div class="kpi-card" style="flex:1;">
      <div class="kpi-value">${stats.contacted}</div>
      <div class="kpi-sub">Contactés</div>
    </div>
    <div class="kpi-card" style="flex:1;">
      <div class="kpi-value">${stats.qualified + stats.proposalSent}</div>
      <div class="kpi-sub">Qualifiés</div>
    </div>
    <div class="kpi-card" style="flex:1;">
      <div class="kpi-value" style="color:var(--lime);">${stats.clients}</div>
      <div class="kpi-sub">Clients</div>
    </div>
  </div>
  
  <!-- Actions prioritaires -->
  ${(() => {
    const now = new Date();
    const toContactList = prospects.filter(p => p.status === 'to_contact').slice(0, 5);
    const toFollowUp = prospects.filter(p => {
      if (!p.lastContact || p.status === 'client' || p.status === 'lost') return false;
      const lastContactDate = new Date(p.lastContact);
      const daysSince = Math.floor((now - lastContactDate) / (1000 * 60 * 60 * 24));
      return daysSince >= 7; // Relancer après 7 jours
    }).sort((a, b) => new Date(a.lastContact) - new Date(b.lastContact)).slice(0, 5);
    
    if (toContactList.length === 0 && toFollowUp.length === 0) return '';
    
    return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
      
      ${toFollowUp.length > 0 ? `
      <div class="card" style="border-left:3px solid var(--orange);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <div style="width:32px;height:32px;background:var(--orange);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;">⚡</div>
          <div>
            <div style="font-weight:700;font-size:14px;">À relancer</div>
            <div style="font-size:11px;color:var(--text2);">${toFollowUp.length} contact(s) sans réponse</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${toFollowUp.map(p => {
