function initCRM() {
  // Recherche avec debounce
  let searchTimeout;
  document.getElementById('crm-search')?.addEventListener('input', (e) => {
    crmState.search = e.target.value;
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      navigate('crm');
    }, 300); // Attendre 300ms après la dernière frappe
  });
  
  // Filtres (rechargement immédiat)
  document.getElementById('crm-filter-status')?.addEventListener('change', (e) => {
    crmState.filterStatus = e.target.value;
    navigate('crm');
  });
  
  document.getElementById('crm-filter-city')?.addEventListener('change', (e) => {
    crmState.filterCity = e.target.value;
    navigate('crm');
  });
  
  document.getElementById('crm-sort')?.addEventListener('change', (e) => {
    crmState.sort = e.target.value;
    navigate('crm');
  });
  
  // Clic sur ligne prospect = édition
  document.querySelectorAll('.prospect-row').forEach(row => {
    row.addEventListener('click', () => {
      const prospectId = parseInt(row.dataset.prospectId);
      const prospect = appData.crmProspects.find(p => p.id === prospectId);
      if (!prospect) return;
      
      openModal(`
        <div class="modal-box">
          <div class="modal-title">
            Éditer prospect
            <button class="modal-close" onclick="closeModal()">×</button>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Prénom</label>
              <input type="text" class="form-input" id="edit-firstName" value="${prospect.firstName}">
            </div>
            <div class="form-group">
              <label class="form-label">Nom</label>
              <input type="text" class="form-input" id="edit-lastName" value="${prospect.lastName}">
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Poste</label>
            <input type="text" class="form-input" id="edit-jobTitle" value="${prospect.jobTitle}">
          </div>
          
          <div class="form-group">
            <label class="form-label">Entreprise</label>
            <input type="text" class="form-input" id="edit-companyName" value="${prospect.companyName}">
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Ville</label>
              <input type="text" class="form-input" id="edit-city" value="${prospect.city}">
            </div>
            <div class="form-group">
              <label class="form-label">Région</label>
              <input type="text" class="form-input" id="edit-region" value="${prospect.region}">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Site web</label>
              <input type="text" class="form-input" id="edit-website" value="${prospect.companyWebsite || ''}">
            </div>
            <div class="form-group">
              <label class="form-label">LinkedIn</label>
              <input type="text" class="form-input" id="edit-linkedin" value="${prospect.linkedin || ''}">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">CA estimé</label>
              <select class="form-input" id="edit-revenue">
                <option ${prospect.revenue === '0-500K' ? 'selected' : ''}>0-500K</option>
                <option ${prospect.revenue === '500K-1M' ? 'selected' : ''}>500K-1M</option>
                <option ${prospect.revenue === '1M-5M' ? 'selected' : ''}>1M-5M</option>
                <option ${prospect.revenue === '5M-10M' ? 'selected' : ''}>5M-10M</option>
                <option ${prospect.revenue === '10M+' ? 'selected' : ''}>10M+</option>
                <option ${prospect.revenue === 'N/A' ? 'selected' : ''}>N/A</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Employés</label>
              <select class="form-input" id="edit-employees">
                <option ${prospect.employees === '1-10' ? 'selected' : ''}>1-10</option>
                <option ${prospect.employees === '11-50' ? 'selected' : ''}>11-50</option>
                <option ${prospect.employees === '51-200' ? 'selected' : ''}>51-200</option>
                <option ${prospect.employees === '201-500' ? 'selected' : ''}>201-500</option>
                <option ${prospect.employees === '500+' ? 'selected' : ''}>500+</option>
                <option ${prospect.employees === 'N/A' ? 'selected' : ''}>N/A</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Statut</label>
            <select class="form-input" id="edit-status">
              <option value="to_contact" ${prospect.status === 'to_contact' ? 'selected' : ''}>À contacter</option>
              <option value="contacted" ${prospect.status === 'contacted' ? 'selected' : ''}>Contacté</option>
              <option value="qualified" ${prospect.status === 'qualified' ? 'selected' : ''}>Qualifié</option>
              <option value="proposal_sent" ${prospect.status === 'proposal_sent' ? 'selected' : ''}>Devis envoyé</option>
              <option value="client" ${prospect.status === 'client' ? 'selected' : ''}>Client</option>
              <option value="lost" ${prospect.status === 'lost' ? 'selected' : ''}>Perdu</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea class="form-textarea" id="edit-notes" style="min-height:80px;">${prospect.notes || ''}</textarea>
          </div>
          
          <div style="display:flex;gap:8px;margin-top:16px;">
            <button class="btn btn-lime" id="save-prospect-edit-btn">Sauvegarder</button>
            <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
          </div>
        </div>
      `);
      
      // Handler sauvegarde
      document.getElementById('save-prospect-edit-btn')?.addEventListener('click', async () => {
        // Mettre à jour dans appData
        prospect.firstName = document.getElementById('edit-firstName')?.value || prospect.firstName;
        prospect.lastName = document.getElementById('edit-lastName')?.value || prospect.lastName;
        prospect.jobTitle = document.getElementById('edit-jobTitle')?.value || prospect.jobTitle;
        prospect.companyName = document.getElementById('edit-companyName')?.value || prospect.companyName;
        prospect.city = document.getElementById('edit-city')?.value || prospect.city;
        prospect.region = document.getElementById('edit-region')?.value || prospect.region;
        prospect.companyWebsite = document.getElementById('edit-website')?.value || '';
        prospect.linkedin = document.getElementById('edit-linkedin')?.value || '';
        prospect.revenue = document.getElementById('edit-revenue')?.value || prospect.revenue;
        prospect.employees = document.getElementById('edit-employees')?.value || prospect.employees;
        prospect.status = document.getElementById('edit-status')?.value || prospect.status;
        prospect.notes = document.getElementById('edit-notes')?.value || '';
        
        // TODO: Sauvegarder dans Supabase
        // await supabaseUpdate('crm_prospects', prospectId, prospect);
        
        closeModal();
        toast('✓ Prospect mis à jour !');
        navigate('crm');
      });
    });
  });
  
  // Handler cartes rapides (à relancer + à contacter)
  document.querySelectorAll('.prospect-quick-card').forEach(card => {
    card.addEventListener('click', () => {
      const prospectId = parseInt(card.dataset.prospectId);
      const prospect = appData.crmProspects.find(p => p.id === prospectId);
      if (!prospect) return;
      
      // Ouvrir modal édition (réutiliser le code existant)
      const row = document.querySelector(`.prospect-row[data-prospect-id="${prospectId}"]`);
      if (row) {
        row.click(); // Déclencher le clic sur la ligne correspondante
      }
    });
  });
}

function renderSocial() {

  console.log('📊 socialPosts:', appData.socialPosts);
  const posts = appData.socialPosts || [];
  console.log('✓ Posts chargés:', posts.length);
  
  // Filtrer
  let filtered = posts.filter(p => {
    if (socialState.filterPlatform !== 'all' && p.platform !== socialState.filterPlatform) return false;
    if (socialState.filterStatus !== 'all' && p.status !== socialState.filterStatus) return false;
    return true;
  });
  
  // Trier par date (plus récent d'abord)
  filtered.sort((a, b) => new Date(b.scheduledDate + ' ' + b.scheduledTime) - new Date(a.scheduledDate + ' ' + a.scheduledTime));

          weekEnd.setDate(weekStart.getDate() + 6);
          
          return `
          <div class="card">
            <div style="font-weight:700;font-size:14px;margin-bottom:16px;color:var(--text2);">
              Semaine du ${weekStart.toLocaleDateString('fr-FR', {day: '2-digit', month: 'long'})} au ${weekEnd.toLocaleDateString('fr-FR', {day: '2-digit', month: 'long'})}
            </div>
            <div style="display:grid;grid-template-columns:repeat(7, 1fr);gap:8px;">
              ${[...Array(7)].map((_, dayIndex) => {
                const day = new Date(weekStart);
                day.setDate(weekStart.getDate() + dayIndex);
                const dayKey = day.toISOString().split('T')[0];
                const dayPosts = weekPosts.filter(p => p.scheduledDate === dayKey);
                
                return `
                <div style="background:var(--bg3);border-radius:6px;padding:12px;min-height:120px;">
                  <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;">
                    ${day.toLocaleDateString('fr-FR', {weekday: 'short', day: '2-digit'})}
                  </div>
                  ${dayPosts.map(post => {
                    const platformColor = getPlatformColor(post.platform);
                    const statusBadge = getStatusBadge(post.status);
                    return `
                    <div class="social-post-card" data-post-id="${post.id}" style="background:var(--bg2);border-left:3px solid ${platformColor};border-radius:4px;padding:8px;margin-bottom:6px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='var(--bg2)'">
                      <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;">
                        <span style="font-size:12px;">${getPlatformIcon(post.platform)}</span>
                        <span style="font-size:9px;font-weight:600;color:${platformColor};text-transform:uppercase;">${post.platform}</span>
                      </div>
                      <div style="font-size:10px;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${post.content}</div>
                      <div style="font-size:9px;color:var(--text3);">${post.scheduledTime}</div>
                    </div>
                    `;
                  }).join('')}
                </div>
                `;
              }).join('')}
            </div>
          </div>
          `;
        }).join('')}
      </div>
    `;
  };
  
  return `
<div style="padding:24px;">
  
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
    <div>
      <h2 style="font-size:24px;font-weight:700;margin:0;">Réseaux Sociaux</h2>
      <div style="font-size:13px;color:var(--text2);margin-top:4px;">${filtered.length} publication(s) · ${stats.total} total</div>
    </div>
    <button class="btn btn-lime" id="add-post-btn">+ Publication</button>
  </div>
  
  <div style="display:flex;gap:12px;margin-bottom:24px;">
    <div class="kpi-card" style="flex:1;">
      <div class="kpi-value">${stats.scheduled}</div>
      <div class="kpi-sub">Programmées</div>
    </div>
    <div class="kpi-card" style="flex:1;">
      <div class="kpi-value">${stats.draft}</div>
      <div class="kpi-sub">Brouillons</div>
    </div>
    <div class="kpi-card" style="flex:1;">
      <div class="kpi-value" style="color:var(--lime);">${stats.published}</div>
      <div class="kpi-sub">Publiées</div>
    </div>
  </div>
  
  <div class="card" style="margin-bottom:16px;">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;">
      
      <div>
        <label class="form-label">Plateforme</label>
        <select class="form-input" id="social-filter-platform">
          <option value="all" ${socialState.filterPlatform === 'all' ? 'selected' : ''}>Toutes</option>
          <option value="instagram" ${socialState.filterPlatform === 'instagram' ? 'selected' : ''}>Instagram</option>
          <option value="linkedin" ${socialState.filterPlatform === 'linkedin' ? 'selected' : ''}>LinkedIn</option>
          <option value="twitter" ${socialState.filterPlatform === 'twitter' ? 'selected' : ''}>Twitter</option>
          <option value="facebook" ${socialState.filterPlatform === 'facebook' ? 'selected' : ''}>Facebook</option>
        </select>
      </div>
      
      <div>
        <label class="form-label">Statut</label>
        <select class="form-input" id="social-filter-status">
          <option value="all" ${socialState.filterStatus === 'all' ? 'selected' : ''}>Tous</option>
          <option value="draft" ${socialState.filterStatus === 'draft' ? 'selected' : ''}>Brouillon</option>
          <option value="scheduled" ${socialState.filterStatus === 'scheduled' ? 'selected' : ''}>Programmé</option>
          <option value="published" ${socialState.filterStatus === 'published' ? 'selected' : ''}>Publié</option>
        </select>
      </div>
      
      <div></div>
      
      <div style="display:flex;align-items:flex-end;">
        <button class="btn btn-ghost" style="width:100%;" onclick="socialState.view = socialState.view === 'list' ? 'calendar' : 'list'; navigate('social');">
          ${socialState.view === 'list' ? '📅 Calendrier' : '📋 Liste'}
        </button>
      </div>
      
    </div>
  </div>
  
  ${socialState.view === 'list' ? renderListView() : renderCalendarView()}
  
</div>
  `;
}

function initSocial() {
  // Filtres
  document.getElementById('social-view')?.addEventListener('change', (e) => {
    socialState.view = e.target.value;
    navigate('social');
  });
  
  document.getElementById('social-filter-platform')?.addEventListener('change', (e) => {
    socialState.filterPlatform = e.target.value;
    navigate('social');
  });
  
  document.getElementById('social-filter-status')?.addEventListener('change', (e) => {
    socialState.filterStatus = e.target.value;
    navigate('social');
  });
  
  // Bouton ajouter publication
  document.getElementById('add-post-btn')?.addEventListener('click', () => {
    openModal(`
      <div class="modal-box">
        <div class="modal-title">
          Nouvelle publication
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        
        <div class="form-group">
          <label class="form-label">Plateforme</label>
          <select class="form-input" id="new-platform">
            <option value="instagram">Instagram</option>
            <option value="linkedin">LinkedIn</option>
            <option value="twitter">Twitter</option>
            <option value="facebook">Facebook</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">Contenu</label>
          <textarea class="form-textarea" id="new-content" style="min-height:100px;" placeholder="Votre publication..."></textarea>
        </div>
        
        <div class="form-group">
          <label class="form-label">Hashtags</label>
          <input type="text" class="form-input" id="new-hashtags" placeholder="#design #branding">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="new-date">
          </div>
          <div class="form-group">
            <label class="form-label">Heure</label>
            <input type="time" class="form-input" id="new-time" value="10:00">
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Statut</label>
          <select class="form-input" id="new-status">
            <option value="draft">Brouillon</option>
            <option value="scheduled">Programmé</option>
          </select>
        </div>
        
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button class="btn btn-lime" id="save-post-btn">Créer</button>
          <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        </div>
      </div>
    `);
    
    document.getElementById('save-post-btn')?.addEventListener('click', () => {
      const newPost = {
        id: Date.now(),
        platform: document.getElementById('new-platform')?.value || 'instagram',
        content: document.getElementById('new-content')?.value || '',
        hashtags: document.getElementById('new-hashtags')?.value || '',
        scheduledDate: document.getElementById('new-date')?.value || new Date().toISOString().split('T')[0],
        scheduledTime: document.getElementById('new-time')?.value || '10:00',
        status: document.getElementById('new-status')?.value || 'draft',
        image: false
      };
      
      appData.socialPosts.push(newPost);
      // TODO: Sauvegarder dans Supabase
      
      closeModal();
      toast('✓ Publication créée !');
      navigate('social');
    });
  });
  
  // Éditer publication
  document.querySelectorAll('.edit-post-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const postId = parseInt(btn.dataset.postId);
      const post = appData.socialPosts.find(p => p.id === postId);
      if (!post) return;
      
      openModal(`
        <div class="modal-box">
          <div class="modal-title">
            Éditer publication
            <button class="modal-close" onclick="closeModal()">×</button>
          </div>
          
          <div class="form-group">
            <label class="form-label">Plateforme</label>
            <select class="form-input" id="edit-platform">
              <option value="instagram" ${post.platform === 'instagram' ? 'selected' : ''}>Instagram</option>
              <option value="linkedin" ${post.platform === 'linkedin' ? 'selected' : ''}>LinkedIn</option>
              <option value="twitter" ${post.platform === 'twitter' ? 'selected' : ''}>Twitter</option>
              <option value="facebook" ${post.platform === 'facebook' ? 'selected' : ''}>Facebook</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">Contenu</label>
            <textarea class="form-textarea" id="edit-content" style="min-height:100px;">${post.content}</textarea>
          </div>
          
          <div class="form-group">
            <label class="form-label">Hashtags</label>
            <input type="text" class="form-input" id="edit-hashtags" value="${post.hashtags}">
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Date</label>
              <input type="date" class="form-input" id="edit-date" value="${post.scheduledDate}">
            </div>
            <div class="form-group">
              <label class="form-label">Heure</label>
              <input type="time" class="form-input" id="edit-time" value="${post.scheduledTime}">
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Statut</label>
            <select class="form-input" id="edit-status">
              <option value="draft" ${post.status === 'draft' ? 'selected' : ''}>Brouillon</option>
              <option value="scheduled" ${post.status === 'scheduled' ? 'selected' : ''}>Programmé</option>
              <option value="published" ${post.status === 'published' ? 'selected' : ''}>Publié</option>
            </select>
          </div>
          
          <div style="display:flex;gap:8px;margin-top:16px;">
            <button class="btn btn-lime" id="update-post-btn">Sauvegarder</button>
            <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
          </div>
        </div>
      `);
      
      document.getElementById('update-post-btn')?.addEventListener('click', () => {
        post.platform = document.getElementById('edit-platform')?.value || post.platform;
        post.content = document.getElementById('edit-content')?.value || post.content;
        post.hashtags = document.getElementById('edit-hashtags')?.value || '';
        post.scheduledDate = document.getElementById('edit-date')?.value || post.scheduledDate;
        post.scheduledTime = document.getElementById('edit-time')?.value || post.scheduledTime;
        post.status = document.getElementById('edit-status')?.value || post.status;
        
        // TODO: Sauvegarder dans Supabase
        
        closeModal();
        toast('✓ Publication mise à jour !');
        navigate('social');
      });
    });
  });
  
  // Supprimer publication
  document.querySelectorAll('.delete-post-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      
      if (!confirm('Supprimer cette publication ?')) return;
      
      const postId = parseInt(btn.dataset.postId);
      const index = appData.socialPosts.findIndex(p => p.id === postId);
      if (index !== -1) {
        appData.socialPosts.splice(index, 1);
        // TODO: Supprimer dans Supabase
        toast('✓ Publication supprimée');
        navigate('social');
      }
    });
  });
  
  // Clic sur carte calendrier
  document.querySelectorAll('.social-post-card').forEach(card => {
    card.addEventListener('click', () => {
      const postId = parseInt(card.dataset.postId);
      const editBtn = document.querySelector(`.edit-post-btn[data-post-id="${postId}"]`);
      if (editBtn) editBtn.click();
    });
  });
}




    // === SECTION RENDERERS MAP ===
    const sectionRenderers = {
      dashboard: { render: renderDashboard, init: initDashboard },
      agenda: { render: renderAgenda, init: initAgenda },
      projects: { render: renderProjects, init: initProjects },
      maintenance: { render: renderMaintenance, init: initMaintenance },
      project: { render: renderProjectPage, init: initProjectPage },
      finances: { render: renderFinances, init: initFinances },
      crm: { render: renderCRM, init: initCRM },
      social: { render: renderSocial, init: initSocial }
    };

    // === CONTEXT-SENSITIVE ACTION BUTTON ===
    function handlePrimaryAction() {
      const actions = {
        dashboard: () => document.querySelector('#btn-see-tasks') ? navigate('agenda') : toast('→ Agenda'),
        agenda: () => document.getElementById('btn-add-event')?.click(),
        projects: () => document.getElementById('btn-add-project')?.click(),
        finances: () => document.getElementById('btn-add-invoice')?.click(),
        crm: () => document.getElementById('add-prospect-btn')?.click(),
        social: () => document.getElementById('add-post-btn')?.click()
      };
      const fn = actions[state.activeSection];
      if (fn) fn();
    }

    // === EXPORT (CSV-like summary) ===
    function handleExport() {
      const section = state.activeSection;
      let text = '';
      if (section === 'finances') {
        text = 'Ref;Client;Type;Montant;Statut\n' +
          appData.invoices.map(i => `${i.ref};${i.client};${i.type};${i.amount};${i.status}`).join('\n');
      } else if (section === 'projects') {
        text = 'Projet;Client;Budget;Facturé;Avancement;Statut\n' +
          appData.projects.map(p => `${p.name};${p.client};${p.budget};${p.billed};${p.progress}%;${p.status}`).join('\n');
      } else if (section === 'crm') {
        text = 'Nom;Ville;Secteur;Budget;Source;Étape\n' +
          appData.prospects.map(p => `${p.name};${p.city};${p.sector};${p.budgetEst};${p.source};${p.stage}`).join('\n');
      } else {
        toast('Export disponible sur Projets, Finances & CRM');
        return;
      }
      const blob = new Blob([text], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `phosphor-${section}.csv`; a.click();
      URL.revokeObjectURL(url);
      toast('Export CSV téléchargé ✓');
    }

    // === INIT ===
    function init() {
      // Set current date in fr-FR
      const now = new Date();
      document.getElementById('topbar-date').textContent = now.toLocaleDateString('fr-FR', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });

      // Load theme from localStorage
      const savedTheme = localStorage.getItem('phosphor-theme') || 'dark';
      document.body.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);

      // Nav click handlers
      document.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          navigate(el.dataset.section);
        });
      });

      // Theme toggle
      document.getElementById('theme-toggle').addEventListener('click', () => {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('phosphor-theme', next);
        updateThemeIcon(next);
        toast(next === 'light' ? 'Mode clair activé' : 'Mode sombre activé');
      });

      // Exporter button
      document.getElementById('action-secondary')?.addEventListener('click', handleExport);

      // Keyboard shortcut: Escape = close modal
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

      // Initial render
      navigate('dashboard');
    }

    document.addEventListener('DOMContentLoaded', init);
    
    // Charger les données Supabase au démarrage
    window.addEventListener('load', async () => {
      const loaded = await Supabase.loadAllData();
      if (loaded) {
        navigate('dashboard');
        Supabase.startRealtimeSync();
        console.log('🚀 Phosphor OS chargé avec Supabase');
      } else {
        console.log('⚠️  Utilisation des données mockées');
      }
    });
  </script>
